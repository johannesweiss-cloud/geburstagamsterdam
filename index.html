<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Amsterdam ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --white: #ffffff; --bg: #f7f7f5; --card-bg: #f0f0ee;
  --border: #e2e2de; --text: #111111; --muted: #888880; --radius: 20px;
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; font-weight: 300; min-height: 100vh; max-width: 430px; margin: 0 auto; padding-bottom: 110px; }

.hero { background: var(--white); padding: 60px 28px 48px; text-align: center; border-bottom: 1px solid var(--border); }
.hero-tag { font-size: 11px; letter-spacing: .22em; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; display: block; }
.hero h1 { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 600; line-height: 1.25; margin-bottom: 14px; }
.hero h1 em { font-style: italic; font-weight: 400; }
.hero-sub { font-size: 15px; color: var(--muted); line-height: 1.6; }

.section-label { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); padding: 28px 20px 10px; }
.date-list { display: flex; flex-direction: column; gap: 10px; padding: 0 14px; }

.date-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; transition: box-shadow .2s; }
.date-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.06); }
.card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; cursor: pointer; user-select: none; -webkit-user-select: none; gap: 12px; }
.card-header-left { flex: 1; min-width: 0; }
.card-num { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
.card-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; line-height: 1.2; }
.card-desc-preview { font-size: 13px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.card-thumb { width: 42px; height: 42px; border-radius: 10px; background: var(--card-bg); border: 1px solid var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.chevron { width: 18px; height: 18px; color: var(--muted); transition: transform .25s ease; flex-shrink: 0; }
.date-card.open .chevron { transform: rotate(180deg); }
.card-body { max-height: 0; overflow: hidden; transition: max-height .35s cubic-bezier(.4,0,.2,1); }
.date-card.open .card-body { max-height: 700px; }
.card-body-inner { padding: 0 18px 20px; border-top: 1px solid var(--border); }
.card-desc-full { font-size: 14px; line-height: 1.65; color: var(--muted); padding-top: 14px; margin-bottom: 14px; }

.img-zone { border: 1.5px dashed var(--border); border-radius: 14px; overflow: hidden; cursor: pointer; transition: border-color .2s; position: relative; background: var(--bg); }
.img-zone:hover { border-color: var(--muted); }
.img-zone-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 28px 20px; color: var(--muted); font-size: 12px; letter-spacing: .08em; text-transform: uppercase; pointer-events: none; }
.img-zone-placeholder svg { opacity: .35; }
.img-zone-preview { width: 100%; aspect-ratio: 16/10; object-fit: cover; display: block; }
.img-zone-hint { font-size: 11px; text-align: center; color: var(--muted); padding: 7px; background: rgba(0,0,0,.03); }

.add-btn-wrap { padding: 10px 14px 0; }
.add-btn { width: 100%; background: var(--white); border: 1.5px dashed var(--border); border-radius: var(--radius); padding: 17px; font-family: 'Outfit', sans-serif; font-size: 14px; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: border-color .2s, color .2s; }
.add-btn:hover { border-color: var(--text); color: var(--text); }

.extra-section { padding: 28px 14px 0; }
.extra-label { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; padding: 0 4px; }
.extra-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.extra-slot { border-radius: 14px; overflow: hidden; aspect-ratio: 1; cursor: pointer; border: 1.5px solid var(--border); background: var(--white); display: flex; align-items: center; justify-content: center; transition: border-color .2s; }
.extra-slot:hover { border-color: var(--muted); }
.extra-slot img { width: 100%; height: 100%; object-fit: cover; display: block; }
.extra-add { border: 1.5px dashed var(--border); border-radius: 14px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); background: var(--white); transition: border-color .2s, color .2s; }
.extra-add:hover { border-color: var(--text); color: var(--text); }

.bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(247,247,245,.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-top: 1px solid var(--border); padding: 12px 16px 24px; z-index: 200; }
.export-btn { width: 100%; background: var(--text); color: var(--white); border: none; border-radius: 14px; padding: 15px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity .2s; }
.export-btn:hover { opacity: .85; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); backdrop-filter: blur(4px); z-index: 500; display: flex; align-items: flex-end; justify-content: center; }
.modal-overlay.hidden { display: none; }
.modal-sheet { background: var(--white); border-radius: 24px 24px 0 0; padding: 24px 22px 44px; width: 100%; max-width: 430px; animation: slideUp .3s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 22px; }
.modal-sheet h3 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; margin-bottom: 18px; }
.field-label { font-size: 11px; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; display: block; }
.field-input { width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; font-family: 'Outfit', sans-serif; font-size: 15px; color: var(--text); outline: none; margin-bottom: 14px; transition: border-color .2s; -webkit-appearance: none; }
.field-input:focus { border-color: var(--text); }
textarea.field-input { resize: none; min-height: 86px; line-height: 1.55; }
.modal-actions { display: flex; gap: 10px; margin-top: 6px; }
.modal-cancel { padding: 13px 18px; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; font-family: 'Outfit', sans-serif; font-size: 14px; color: var(--muted); cursor: pointer; }
.modal-save { flex: 1; padding: 13px; background: var(--text); border: none; border-radius: 12px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 500; color: var(--white); cursor: pointer; }

.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--white); padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 600; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="hero">
  <span class="hero-tag">Amsterdam · 2026</span>
  <h1>Alles Gute zum<br>Geburtstag, <em>Schatzi!</em></h1>
  <p class="hero-sub">Date Ideen für unsere Zeit in Amsterdam</p>
</div>

<div class="section-label">Unsere Dates</div>
<div class="date-list" id="date-list"></div>

<div class="add-btn-wrap">
  <button class="add-btn" onclick="openModal()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Neues Date hinzufügen
  </button>
</div>

<div class="extra-section">
  <div class="extra-label">Weitere Bilder</div>
  <div class="extra-grid" id="extra-grid"></div>
</div>

<div class="bottom-bar">
  <button class="export-btn" onclick="exportPDF()">Als Erinnerung exportieren ↓</button>
</div>

<div class="modal-overlay hidden" id="modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h3>Neues Date</h3>
    <label class="field-label">Titel</label>
    <input class="field-input" type="text" id="new-title" placeholder="z.B. Tretboot fahren…" autocomplete="off">
    <label class="field-label">Beschreibung</label>
    <textarea class="field-input" id="new-desc" placeholder="Was erwartet uns dort?"></textarea>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="modal-save" onclick="addDate()">Hinzufügen</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
let dates = [];
let extras = [];

function loadState() {
  try {
    const d = localStorage.getItem('ams-dates-v2');
    const e = localStorage.getItem('ams-extras-v2');
    dates = d ? JSON.parse(d) : getDefaultDates();
    extras = e ? JSON.parse(e) : [];
  } catch(_) { dates = getDefaultDates(); extras = []; }
}

function saveState() {
  try {
    localStorage.setItem('ams-dates-v2', JSON.stringify(dates));
    localStorage.setItem('ams-extras-v2', JSON.stringify(extras));
  } catch(e) { showToast('Speicherfehler – Bilder evtl. zu groß'); }
}

function getDefaultDates() {
  return [
    { id: uid(), title: 'Tretboot', desc: 'Tretboot fahren in den Kanälen Amsterdams', img: null },
    { id: uid(), title: 'Flughafen', desc: 'Flugzeugen beim Starten und Landen zuschauen', img: null },
    { id: uid(), title: 'Lookout', desc: 'Schöne Aussicht über ganz Amsterdam', img: null },
    { id: uid(), title: 'Topgolf', desc: 'Minigolf aber mal bisschen anders', img: null },
  ];
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ── RENDER ────────────────────────────────────────────────────
function renderDates() {
  const list = document.getElementById('date-list');
  const openIds = new Set([...list.querySelectorAll('.date-card.open')].map(c => c.id.replace('card-','')));
  list.innerHTML = '';

  dates.forEach((d, i) => {
    const card = document.createElement('div');
    card.className = 'date-card' + (openIds.has(d.id) ? ' open' : '');
    card.id = 'card-' + d.id;

    const thumbHTML = d.img
      ? `<div class="card-thumb"><img src="${d.img}" alt=""></div>`
      : `<div class="card-thumb"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;

    const imgZoneHTML = d.img
      ? `<div class="img-zone" data-id="${d.id}"><img class="img-zone-preview" src="${d.img}" alt=""><div class="img-zone-hint">Tippen zum Ändern</div></div>`
      : `<div class="img-zone" data-id="${d.id}"><div class="img-zone-placeholder"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Foto hinzufügen</div></div>`;

    card.innerHTML = `
      <div class="card-header" data-toggle="${d.id}">
        <div class="card-header-left">
          <div class="card-num">Date ${String(i+1).padStart(2,'0')}</div>
          <div class="card-title">${esc(d.title)}</div>
          <div class="card-desc-preview">${esc(d.desc)}</div>
        </div>
        <div class="card-right">${thumbHTML}
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="card-body"><div class="card-body-inner">
        <div class="card-desc-full">${esc(d.desc)}</div>
        ${imgZoneHTML}
      </div></div>`;

    list.appendChild(card);
  });

  list.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', () => toggleCard(el.dataset.toggle));
  });
  list.querySelectorAll('.img-zone').forEach(el => {
    el.addEventListener('click', () => triggerDateUpload(el.dataset.id));
  });
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  if (!card) return;
  const isOpen = card.classList.contains('open');
  document.querySelectorAll('.date-card.open').forEach(c => c.classList.remove('open'));
  if (!isOpen) card.classList.add('open');
}

function renderExtras() {
  const grid = document.getElementById('extra-grid');
  grid.innerHTML = '';
  extras.forEach((img, i) => {
    const slot = document.createElement('div');
    slot.className = 'extra-slot';
    const imgEl = document.createElement('img');
    imgEl.src = img; imgEl.alt = '';
    slot.appendChild(imgEl);
    slot.addEventListener('click', () => pickImage(dataUrl => {
      extras[i] = dataUrl; saveState(); renderExtras(); showToast('Bild geändert ✓');
    }));
    grid.appendChild(slot);
  });
  const addBtn = document.createElement('div');
  addBtn.className = 'extra-add';
  addBtn.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
  addBtn.addEventListener('click', () => pickImage(dataUrl => {
    extras.push(dataUrl); saveState(); renderExtras(); showToast('Bild hinzugefügt ✓');
  }));
  grid.appendChild(addBtn);
}

// ── IMAGE PICKER ──────────────────────────────────────────────
function pickImage(onResult) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/jpeg,image/png,image/webp,image/heic,image/heif';
  input.style.cssText = 'position:fixed;top:-500px;left:-500px;opacity:0;width:1px;height:1px;';
  document.body.appendChild(input);
  let handled = false;
  input.addEventListener('change', function() {
    if (handled) return; handled = true;
    const file = this.files && this.files[0];
    setTimeout(() => { try { document.body.removeChild(input); } catch(_){} }, 100);
    if (!file) return;
    resizeImage(file, onResult);
  });
  setTimeout(() => input.click(), 50);
}

function resizeImage(file, callback) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const MAX = 1600;
      let w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', 0.88));
    };
    img.onerror = () => showToast('Bild konnte nicht geladen werden');
    img.src = e.target.result;
  };
  reader.onerror = () => showToast('Datei konnte nicht gelesen werden');
  reader.readAsDataURL(file);
}

function triggerDateUpload(id) {
  pickImage(dataUrl => {
    const d = dates.find(x => x.id === id);
    if (!d) return;
    d.img = dataUrl;
    saveState(); renderDates();
    requestAnimationFrame(() => {
      const card = document.getElementById('card-' + id);
      if (card) card.classList.add('open');
    });
    showToast('Foto gespeichert ✓');
  });
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('new-title').focus(), 350);
}
function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  document.getElementById('new-title').value = '';
  document.getElementById('new-desc').value = '';
}
function addDate() {
  const title = document.getElementById('new-title').value.trim();
  const desc = document.getElementById('new-desc').value.trim();
  if (!title) { document.getElementById('new-title').focus(); return; }
  dates.push({ id: uid(), title, desc, img: null });
  saveState(); renderDates(); closeModal();
  showToast('Date hinzugefügt ✓');
  setTimeout(() => document.getElementById('date-list').lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150);
}
document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

// ── PDF EXPORT – direct jsPDF canvas drawing ──────────────────
async function exportPDF() {
  if (!window.jspdf) { showToast('Bitte kurz warten…'); return; }
  showToast('PDF wird erstellt…');

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });

  const PW = 210; // A4 width mm
  const PH = 297; // A4 height mm
  const ML = 16;  // margin left
  const MR = 16;  // margin right
  const MT = 16;  // margin top
  const CW = PW - ML - MR; // content width = 178mm

  let y = MT;

  // ── Helper: load image into canvas, return {canvas, w, h} ──
  function loadImg(src) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = src;
    });
  }

  // ── Helper: draw image fitted into a box, return actual drawn height ──
  function drawImgFit(imgEl, x, y, boxW, boxH) {
    if (!imgEl) return;
    const ratio = imgEl.width / imgEl.height;
    let dw = boxW, dh = boxW / ratio;
    if (dh > boxH) { dh = boxH; dw = boxH * ratio; }
    const dx = x + (boxW - dw) / 2;
    const dy = y + (boxH - dh) / 2;
    pdf.addImage(imgEl.src, 'JPEG', dx, dy, dw, dh);
    return dh;
  }

  // ── Helper: new page if needed ──
  function checkPage(neededH) {
    if (y + neededH > PH - 16) {
      pdf.addPage();
      y = MT;
    }
  }

  // ── HEADER ──
  pdf.setFont('helvetica', 'normal');
  pdf.setFontSize(8);
  pdf.setTextColor(170, 170, 170);
  pdf.text('AMSTERDAM · 2026', PW / 2, y + 4, { align: 'center', charSpace: 1.5 });
  y += 10;

  pdf.setFont('times', 'bold');
  pdf.setFontSize(24);
  pdf.setTextColor(17, 17, 17);
  pdf.text('Alles Gute zum Geburtstag, Schatzi!', PW / 2, y + 8, { align: 'center' });
  y += 14;

  pdf.setFont('times', 'italic');
  pdf.setFontSize(11);
  pdf.setTextColor(130, 130, 120);
  pdf.text('Unsere Date-Erinnerungen aus Amsterdam', PW / 2, y + 4, { align: 'center' });
  y += 10;

  // Divider
  pdf.setDrawColor(220, 220, 215);
  pdf.setLineWidth(0.3);
  pdf.line(ML, y, PW - MR, y);
  y += 8;

  // ── DATE ROWS ──
  const IMG_W = 80;  // mm – image column width
  const IMG_H = 56;  // mm – image height (fixed, proportional crop)
  const TEXT_W = CW - IMG_W - 8; // mm – text column width
  const ROW_H = IMG_H + 10; // total row height including padding

  for (let i = 0; i < dates.length; i++) {
    const d = dates[i];
    const rev = i % 2 === 1; // alternate

    checkPage(ROW_H + 10);

    const imgX = rev ? ML + TEXT_W + 8 : ML;
    const textX = rev ? ML : ML + IMG_W + 8;

    // Draw image or placeholder
    if (d.img) {
      const imgEl = await loadImg(d.img);
      if (imgEl) {
        // Crop to box using canvas
        const canvas = document.createElement('canvas');
        const PX_W = 400, PX_H = Math.round(400 * IMG_H / IMG_W);
        canvas.width = PX_W; canvas.height = PX_H;
        const ctx = canvas.getContext('2d');
        // center-crop
        const srcRatio = imgEl.width / imgEl.height;
        const dstRatio = PX_W / PX_H;
        let sx, sy, sw, sh;
        if (srcRatio > dstRatio) {
          sh = imgEl.height; sw = sh * dstRatio;
          sx = (imgEl.width - sw) / 2; sy = 0;
        } else {
          sw = imgEl.width; sh = sw / dstRatio;
          sx = 0; sy = (imgEl.height - sh) / 2;
        }
        ctx.drawImage(imgEl, sx, sy, sw, sh, 0, 0, PX_W, PX_H);
        const cropped = canvas.toDataURL('image/jpeg', 0.92);
        pdf.addImage(cropped, 'JPEG', imgX, y, IMG_W, IMG_H, '', 'FAST');
      }
    } else {
      // Placeholder box
      pdf.setFillColor(240, 240, 238);
      pdf.roundedRect(imgX, y, IMG_W, IMG_H, 3, 3, 'F');
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(7);
      pdf.setTextColor(180, 180, 175);
      pdf.text('KEIN FOTO', imgX + IMG_W / 2, y + IMG_H / 2, { align: 'center' });
    }

    // Text block
    const textY = y;

    // Date number
    pdf.setFont('helvetica', 'normal');
    pdf.setFontSize(7);
    pdf.setTextColor(170, 170, 160);
    pdf.text(`DATE ${String(i+1).padStart(2,'0')}`, textX, textY + 5, { charSpace: 1.5 });

    // Title
    pdf.setFont('times', 'bold');
    pdf.setFontSize(18);
    pdf.setTextColor(17, 17, 17);
    const titleLines = pdf.splitTextToSize(d.title, TEXT_W);
    pdf.text(titleLines, textX, textY + 13);
    const titleH = titleLines.length * 7;

    // Description
    pdf.setFont('helvetica', 'normal');
    pdf.setFontSize(9.5);
    pdf.setTextColor(100, 100, 90);
    const descLines = pdf.splitTextToSize(d.desc, TEXT_W);
    pdf.text(descLines, textX, textY + 13 + titleH + 2);

    y += ROW_H;

    // Divider between dates
    if (i < dates.length - 1) {
      pdf.setDrawColor(235, 235, 230);
      pdf.setLineWidth(0.2);
      pdf.line(ML, y, PW - MR, y);
      y += 6;
    }
  }

  // ── EXTRA IMAGES ──
  if (extras.length > 0) {
    y += 6;
    checkPage(60);

    pdf.setDrawColor(220, 220, 215);
    pdf.setLineWidth(0.3);
    pdf.line(ML, y, PW - MR, y);
    y += 6;

    pdf.setFont('helvetica', 'normal');
    pdf.setFontSize(7);
    pdf.setTextColor(170, 170, 160);
    pdf.text('WEITERE BILDER', ML, y + 3, { charSpace: 1.5 });
    y += 8;

    const COLS = 3;
    const GAP = 4;
    const THUMB = (CW - GAP * (COLS - 1)) / COLS; // ~56mm each

    for (let i = 0; i < extras.length; i++) {
      const col = i % COLS;
      const row = Math.floor(i / COLS);
      if (col === 0 && row > 0) {
        y += THUMB + GAP;
        checkPage(THUMB + GAP);
      }
      const ex = ML + col * (THUMB + GAP);
      const ey = y;

      const imgEl = await loadImg(extras[i]);
      if (imgEl) {
        // Square crop
        const canvas = document.createElement('canvas');
        const SZ = 300;
        canvas.width = SZ; canvas.height = SZ;
        const ctx = canvas.getContext('2d');
        const s = Math.min(imgEl.width, imgEl.height);
        const sx = (imgEl.width - s) / 2, sy = (imgEl.height - s) / 2;
        ctx.drawImage(imgEl, sx, sy, s, s, 0, 0, SZ, SZ);
        pdf.addImage(canvas.toDataURL('image/jpeg', 0.88), 'JPEG', ex, ey, THUMB, THUMB, '', 'FAST');
      } else {
        pdf.setFillColor(240,240,238);
        pdf.roundedRect(ex, ey, THUMB, THUMB, 2, 2, 'F');
      }
    }
    y += THUMB + GAP;
  }

  pdf.save('amsterdam-erinnerung.pdf');
  showToast('PDF gespeichert ✓');
}

// ── UTILS ─────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2500);
}
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadState();
renderDates();
renderExtras();
</script>
</body>
